name: BDRCS RSS to Telegram

on:
  schedule:
    - cron: "*/10 * * * *"   # প্রতি ১০ মিনিটে একবার
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python bot.py

      - name: Commit state
        run: |
          git config user.name "bdrcs-bot"
          git config user.email "bdrcs-bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || true
          git push || true
