name: BDRCS RSS to Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure state file exists
        run: |
          if [ ! -f state.json ]; then
            echo '{"seen":[]}' > state.json
          fi

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python bot.py

      - name: Commit state
        run: |
          git config user.name "bdrcs-bot"
          git config user.email "bdrcs-bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state"
          git push
